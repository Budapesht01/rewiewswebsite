<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RATED — оцени всё</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --black: #080808;
  --white: #f2f2f0;
  --grey:  #1a1a1a;
  --mid:   #333;
  --dim:   #888;
  --line:  #222;
  --accent:#f2f2f0;
  --red:   #ff3333;
  --score-glow: rgba(242,242,240,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
#cursor {
  width: 12px; height: 12px;
  background: var(--white);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transition: transform 0.15s ease, background 0.2s;
  mix-blend-mode: difference;
}
#cursor.big { transform: scale(4); }

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9998;
  opacity: 0.35;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--mid); }

/* ── TOPBAR ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  border-bottom: 1px solid var(--line);
  background: rgba(8,8,8,0.9);
  backdrop-filter: blur(20px);
  z-index: 1000;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 0.12em;
  cursor: pointer;
}
.logo span { color: var(--dim); font-size: 11px; letter-spacing: 0.3em; font-family: 'DM Mono', monospace; display: block; margin-top: -6px; }

.nav-right { display: flex; align-items: center; gap: 24px; }

.btn-ghost {
  background: none; border: 1px solid var(--line);
  color: var(--dim); padding: 6px 18px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-ghost:hover { border-color: var(--white); color: var(--white); }

.btn-solid {
  background: var(--white); border: none;
  color: var(--black); padding: 7px 20px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-solid:hover { opacity: 0.85; }

.search-wrap {
  position: relative;
}
#search-input {
  background: var(--grey); border: 1px solid var(--line);
  color: var(--white); padding: 7px 16px 7px 36px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  width: 220px; outline: none;
  transition: border-color 0.2s, width 0.3s;
}
#search-input:focus { border-color: var(--dim); width: 300px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 13px; pointer-events: none; }

#search-results {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: var(--grey); border: 1px solid var(--mid);
  max-height: 400px; overflow-y: auto; z-index: 2000;
  display: none;
}
#search-results.open { display: block; }
.search-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid var(--line);
  transition: background 0.15s;
}
.search-item:hover { background: var(--mid); }
.search-item img { width: 32px; height: 48px; object-fit: cover; }
.search-item-info { flex: 1; }
.search-item-title { font-size: 13px; font-weight: 500; }
.search-item-meta { font-size: 10px; color: var(--dim); font-family: 'DM Mono', monospace; margin-top: 2px; }

/* ── PAGES ── */
.page { display: none; padding-top: 60px; min-height: 100vh; }
.page.active { display: block; }

/* ── HOME ── */
#home { }

.hero {
  padding: 100px 40px 60px;
  border-bottom: 1px solid var(--line);
  position: relative; overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(255,255,255,0.03) 0%, transparent 70%);
  pointer-events: none;
}
.hero-label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 20px;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 12vw, 180px);
  line-height: 0.9; letter-spacing: 0.02em;
  color: var(--white);
}
.hero-title em { color: var(--dim); font-style: normal; }
.hero-sub {
  margin-top: 28px; max-width: 440px;
  font-size: 15px; font-weight: 300; line-height: 1.7;
  color: var(--dim);
}
.hero-num {
  position: absolute; right: 40px; bottom: 40px;
  font-family: 'Bebas Neue', sans-serif; font-size: 140px;
  color: rgba(255,255,255,0.03); line-height: 1; pointer-events: none;
}

/* ── TABS ── */
.tabs {
  display: flex; align-items: center;
  padding: 0 40px;
  border-bottom: 1px solid var(--line);
}
.tab-btn {
  background: none; border: none; color: var(--dim);
  font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 18px 24px 16px; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn.active { color: var(--white); border-bottom-color: var(--white); }
.tab-btn:hover:not(.active) { color: rgba(242,242,240,0.6); }

/* ── GRID ── */
.section { padding: 40px; }
.section-label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 24px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 2px;
}

.card {
  position: relative; overflow: hidden;
  aspect-ratio: 2/3; cursor: pointer;
  background: var(--grey);
}
.card img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
  transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.5s;
  filter: grayscale(100%);
}
.card:hover img { transform: scale(1.08); filter: grayscale(0%); }
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
  opacity: 0; transition: opacity 0.3s;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 16px 14px;
}
.card:hover .card-overlay { opacity: 1; }
.card-title { font-size: 12px; font-weight: 500; line-height: 1.3; }
.card-year { font-size: 10px; color: var(--dim); font-family: 'DM Mono', monospace; margin-top: 3px; }
.card-score-badge {
  position: absolute; top: 10px; right: 10px;
  background: var(--black); border: 1px solid var(--line);
  font-family: 'Bebas Neue', sans-serif; font-size: 16px;
  padding: 2px 8px; opacity: 0; transition: opacity 0.3s;
}
.card:hover .card-score-badge { opacity: 1; }

/* ── MEDIA DETAIL PAGE ── */
#media-page { }

.media-hero {
  position: relative; min-height: 70vh;
  display: flex; align-items: flex-end;
  overflow: hidden;
}
.media-backdrop {
  position: absolute; inset: 0;
  background-size: cover; background-position: center 20%;
  filter: grayscale(100%);
}
.media-backdrop::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(8,8,8,0.3) 0%, rgba(8,8,8,0.7) 50%, var(--black) 100%);
}
.media-hero-content {
  position: relative; z-index: 1;
  padding: 60px 40px 50px;
  display: flex; gap: 40px; align-items: flex-end;
  width: 100%;
}
.media-poster {
  width: 180px; flex-shrink: 0;
  aspect-ratio: 2/3; overflow: hidden;
  border: 1px solid var(--line);
}
.media-poster img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%); }

.media-info { flex: 1; }
.media-type-badge {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.4em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 10px;
}
.media-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(40px, 6vw, 90px);
  line-height: 0.95; letter-spacing: 0.02em;
  margin-bottom: 16px;
}
.media-meta {
  display: flex; gap: 20px; flex-wrap: wrap;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--dim); margin-bottom: 20px;
}
.media-meta span::before { content: '—'; margin-right: 6px; }
.media-overview {
  font-size: 14px; line-height: 1.75; color: rgba(242,242,240,0.7);
  max-width: 600px;
}

/* Score display */
.score-display {
  display: flex; align-items: baseline; gap: 6px;
  margin-bottom: 16px;
}
.score-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px; line-height: 1;
  color: var(--white);
}
.score-max { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--dim); }
.score-count { font-size: 12px; color: var(--dim); font-family: 'DM Mono', monospace; }

/* ── REVIEW SECTION ── */
.review-section {
  padding: 0 40px 60px;
  display: grid; grid-template-columns: 1fr 360px; gap: 60px;
}

.reviews-list-wrap { }
.reviews-title {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 30px;
  padding-top: 40px; border-top: 1px solid var(--line);
}

.review-card {
  border: 1px solid var(--line);
  padding: 24px; margin-bottom: 2px;
  transition: border-color 0.2s;
  animation: fadeSlideIn 0.4s ease both;
}
.review-card:hover { border-color: var(--mid); }
.review-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.review-user {
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--dim); cursor: pointer;
}
.review-user:hover { color: var(--white); }
.review-score-big {
  font-family: 'Bebas Neue', sans-serif; font-size: 48px;
  line-height: 1; color: var(--white);
}
.review-score-big span { font-size: 14px; color: var(--dim); font-family: 'DM Mono', monospace; }
.review-criteria-mini {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
  margin-bottom: 12px;
}
.crit-mini {
  height: 3px; background: var(--line);
  position: relative;
}
.crit-mini-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--white); transition: width 1s ease;
}
.review-comment { font-size: 13px; line-height: 1.7; color: var(--dim); }
.review-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--line); margin-top: 12px; }

/* ── RATING FORM ── */
.rating-sidebar {
  padding-top: 40px;
  border-top: 1px solid var(--line);
}
.rating-form-title {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 24px;
}
.criterion-row {
  margin-bottom: 16px;
}
.criterion-name {
  font-size: 11px; color: var(--dim); margin-bottom: 8px;
  font-weight: 300;
}
.criterion-control {
  display: flex; align-items: center; gap: 10px;
}
.score-slider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 2px; background: var(--line); outline: none;
  cursor: pointer;
}
.score-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px;
  background: var(--white); border-radius: 50%;
  cursor: pointer;
  transition: transform 0.2s;
}
.score-slider::-webkit-slider-thumb:hover { transform: scale(1.4); }
.score-val {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  width: 28px; text-align: right; color: var(--white);
}
.mult-badge {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--dim); width: 28px;
}
.live-score-wrap {
  border: 1px solid var(--line); padding: 20px 24px;
  margin: 24px 0; text-align: center;
}
.live-score-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 4px;
}
.live-score-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 64px;
  line-height: 1;
  transition: color 0.3s;
}
.live-score-num.low { color: #888; }
.live-score-num.mid { color: var(--white); }
.live-score-num.high { color: #f2f2f0; text-shadow: 0 0 40px rgba(255,255,255,0.3); }
.comment-input {
  width: 100%; background: var(--grey); border: 1px solid var(--line);
  color: var(--white); padding: 12px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  resize: vertical; min-height: 80px; outline: none;
  transition: border-color 0.2s;
}
.comment-input:focus { border-color: var(--dim); }
.submit-btn {
  width: 100%; background: var(--white); border: none;
  color: var(--black); padding: 14px;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px;
  letter-spacing: 0.1em; cursor: pointer; margin-top: 12px;
  transition: opacity 0.2s, transform 0.2s;
}
.submit-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.login-prompt {
  border: 1px solid var(--line); padding: 24px;
  text-align: center;
}
.login-prompt p { font-size: 13px; color: var(--dim); margin-bottom: 14px; }

/* ── AUTH MODAL ── */
#modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 5000; display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
#modal-overlay.open { display: flex; }
.modal {
  background: var(--grey); border: 1px solid var(--mid);
  width: 400px; padding: 40px;
  animation: fadeSlideIn 0.25s ease;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 36px;
  letter-spacing: 0.04em; margin-bottom: 28px;
}
.input-group { margin-bottom: 14px; }
.input-group label {
  display: block; font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 6px;
}
.input-group input {
  width: 100%; background: var(--black); border: 1px solid var(--line);
  color: var(--white); padding: 10px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.input-group input:focus { border-color: var(--dim); }
.modal-footer {
  margin-top: 20px; font-size: 12px; color: var(--dim);
  text-align: center;
}
.modal-footer a { color: var(--white); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
.modal-close {
  position: absolute; top: 0; right: 0;
  padding: 20px 24px; background: none; border: none;
  color: var(--dim); font-size: 20px; cursor: pointer;
}
.modal { position: relative; }
.modal-error {
  font-size: 12px; color: var(--red);
  font-family: 'DM Mono', monospace; margin-bottom: 10px;
  min-height: 16px;
}

/* ── PROFILE PAGE ── */
#profile-page { padding: 80px 40px 60px; }
.profile-header {
  display: flex; gap: 30px; align-items: center;
  margin-bottom: 50px; padding-bottom: 40px;
  border-bottom: 1px solid var(--line);
}
.avatar-circle {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--grey); border: 1px solid var(--mid);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 32px;
  color: var(--dim); flex-shrink: 0;
}
.profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 0.03em; }
.profile-stats {
  display: flex; gap: 40px; margin-top: 10px;
}
.profile-stat { }
.profile-stat-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px;
  line-height: 1;
}
.profile-stat-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--dim); margin-top: 2px;
}

.profile-reviews-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2px;
}
.profile-review-card {
  position: relative; aspect-ratio: 2/3;
  overflow: hidden; cursor: pointer;
  background: var(--grey);
}
.profile-review-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(60%); transition: filter 0.3s; }
.profile-review-card:hover img { filter: grayscale(0%); }
.profile-review-info {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 55%);
  padding: 16px;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.profile-review-score {
  font-family: 'Bebas Neue', sans-serif; font-size: 38px;
  line-height: 1;
}
.profile-review-score span { font-size: 12px; color: var(--dim); font-family: 'DM Mono', monospace; }
.profile-review-title { font-size: 12px; font-weight: 500; margin-top: 2px; }
.profile-review-type {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.2em; color: var(--dim); text-transform: uppercase; margin-top: 2px;
}

/* ── LOADER ── */
.loader {
  display: flex; align-items: center; justify-content: center;
  min-height: 300px;
}
.loader-dots { display: flex; gap: 8px; }
.loader-dots span {
  width: 6px; height: 6px; background: var(--mid); border-radius: 50%;
  animation: bounce 0.8s ease infinite;
}
.loader-dots span:nth-child(2) { animation-delay: 0.1s; }
.loader-dots span:nth-child(3) { animation-delay: 0.2s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40% { transform: translateY(-8px); background: var(--white); }
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--white); color: var(--black);
  font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 12px 24px; z-index: 8000;
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.error { background: var(--red); color: var(--white); }

/* ── ANIMATIONS ── */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.fade-in {
  animation: fadeSlideIn 0.5s ease both;
}

/* ── EMPTY ── */
.empty-state {
  padding: 80px 40px; text-align: center;
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.2; }
.empty-state p { color: var(--dim); font-size: 14px; }

/* ── BACK BTN ── */
.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); cursor: pointer; padding: 20px 40px 0;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--white); }

/* ── GENRE CHIPS ── */
.genre-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.genre-chip {
  border: 1px solid var(--line); padding: 3px 10px;
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--dim);
}

/* Responsive */
@media (max-width: 768px) {
  #topbar { padding: 0 20px; }
  .hero { padding: 60px 20px 40px; }
  .section { padding: 30px 20px; }
  .review-section { grid-template-columns: 1fr; padding: 0 20px 40px; }
  .media-hero-content { flex-direction: column; align-items: flex-start; padding: 40px 20px 30px; }
  #profile-page { padding: 80px 20px 40px; }
  #search-input:focus { width: 180px; }
  .tabs { padding: 0 20px; overflow-x: auto; }
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="toast"></div>

<!-- TOPBAR -->
<nav id="topbar">
  <div class="logo" onclick="showPage('home')">
    RATED
    <span>ОЦЕНИ ВСЁ</span>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Поиск фильмов и сериалов…" autocomplete="off"/>
      <div id="search-results"></div>
    </div>
    <div id="auth-btns">
      <button class="btn-ghost" onclick="openModal('login')">Войти</button>
      <button class="btn-solid" onclick="openModal('register')">Регистрация</button>
    </div>
    <div id="user-btn" style="display:none">
      <button class="btn-ghost" onclick="showPage('profile')" id="username-btn"></button>
      <button class="btn-ghost" onclick="logout()">Выйти</button>
    </div>
  </div>
</nav>

<!-- AUTH MODAL -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">ВОЙТИ</div>
    <div class="modal-error" id="modal-error"></div>
    <div id="register-fields" style="display:none">
      <div class="input-group">
        <label>Имя пользователя</label>
        <input type="text" id="reg-username" placeholder="coolname" />
      </div>
    </div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" />
    </div>
    <div class="input-group">
      <label>Пароль</label>
      <input type="password" id="auth-password" placeholder="••••••••" />
    </div>
    <button class="submit-btn" id="modal-submit-btn" onclick="submitAuth()">ВОЙТИ</button>
    <div class="modal-footer" id="modal-footer">
      Нет аккаунта? <a onclick="openModal('register')">Зарегистрироваться</a>
    </div>
  </div>
</div>

<!-- HOME PAGE -->
<div id="home" class="page active">
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-label">// платформа оценок</div>
    <h1 class="hero-title">
      ТВОИ<br/>
      <em>ОЦЕНКИ</em><br/>
      ИМЕЮТ<br/>
      ВЕС
    </h1>
    <p class="hero-sub">Математическая система оценки фильмов, сериалов и игр. Не просто звёзды — настоящий анализ.</p>
    <div class="hero-num">110</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('movies', this)">Фильмы</button>
    <button class="tab-btn" onclick="switchTab('tv', this)">Сериалы</button>
  </div>

  <div class="section">
    <div class="section-label" id="trending-label">// в тренде на этой неделе</div>
    <div class="cards-grid" id="trending-grid">
      <div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>
    </div>
  </div>
</div>

<!-- MEDIA DETAIL PAGE -->
<div id="media-page" class="page">
  <div class="back-btn" onclick="showPage('home')">← Назад</div>
  <div id="media-content"></div>
</div>

<!-- PROFILE PAGE -->
<div id="profile-page" class="page">
  <div id="profile-content"></div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  user: null,
  token: null,
  currentMedia: null,
  criteria: [],
  trendingData: { movies: [], tv: [] },
  activeTab: 'movies',
  authMode: 'login'
};

// ─── INIT ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initCursor();
  initSearch();
  const saved = localStorage.getItem('rated_token');
  const savedUser = localStorage.getItem('rated_user');
  if (saved && savedUser) {
    state.token = saved;
    state.user = JSON.parse(savedUser);
    updateAuthUI();
  }
  loadTrending();
});

// ─── CURSOR ──────────────────────────────────────────────────────────────────
function initCursor() {
  const c = document.getElementById('cursor');
  let mx = 0, my = 0, cx = 0, cy = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  function tick() {
    cx += (mx - cx) * 0.18;
    cy += (my - cy) * 0.18;
    c.style.left = (cx - 6) + 'px';
    c.style.top  = (cy - 6) + 'px';
    requestAnimationFrame(tick);
  }
  tick();
  document.querySelectorAll('a,button,.card,.search-item,.tab-btn,.back-btn,.profile-review-card')
    .forEach(el => {
      el.addEventListener('mouseenter', () => c.classList.add('big'));
      el.addEventListener('mouseleave', () => c.classList.remove('big'));
    });
  document.addEventListener('mouseover', e => {
    if (e.target.matches('a,button,.card,.search-item,.tab-btn,.back-btn,.profile-review-card,[onclick]')) {
      c.classList.add('big');
    } else {
      c.classList.remove('big');
    }
  });
}

// ─── PAGES ───────────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(name === 'media' ? 'media-page' : name === 'profile' ? 'profile-page' : 'home').classList.add('active');
  window.scrollTo(0, 0);
  if (name === 'profile') loadProfile();
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(type, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.activeTab = type;
  renderTrending(type);
}

// ─── TRENDING ────────────────────────────────────────────────────────────────
async function loadTrending() {
  try {
    const data = await api('/api/media/trending');
    state.trendingData = data;
    renderTrending(state.activeTab);
  } catch (e) {
    document.getElementById('trending-grid').innerHTML = '<div class="empty-state"><p>Ошибка загрузки данных</p></div>';
  }
}

function renderTrending(type) {
  const items = type === 'movies' ? state.trendingData.movies : state.trendingData.tv;
  const grid = document.getElementById('trending-grid');
  if (!items || !items.length) {
    grid.innerHTML = '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
    return;
  }
  grid.innerHTML = items.map(item => cardHTML(item, type === 'movies' ? 'movie' : 'tv')).join('');
}

function cardHTML(item, mediaType) {
  const poster = item.poster_path ? `https://image.tmdb.org/t/p/w342${item.poster_path}` : '';
  const title = item.title || item.name || '';
  const year = (item.release_date || item.first_air_date || '').slice(0, 4);
  const score = item.vote_average ? item.vote_average.toFixed(1) : '';
  return `
    <div class="card" onclick="openMedia(${item.id}, '${mediaType}')">
      ${poster ? `<img src="${poster}" alt="${escHtml(title)}" loading="lazy"/>` : '<div style="background:var(--grey);width:100%;height:100%"></div>'}
      <div class="card-overlay">
        <div class="card-title">${escHtml(title)}</div>
        ${year ? `<div class="card-year">${year}</div>` : ''}
      </div>
      ${score ? `<div class="card-score-badge">${score}</div>` : ''}
    </div>`;
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
function initSearch() {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (!q) { results.classList.remove('open'); return; }
    timer = setTimeout(() => doSearch(q), 350);
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) results.classList.remove('open');
  });
}

async function doSearch(q) {
  try {
    const items = await api(`/api/media/search?q=${encodeURIComponent(q)}`);
    const results = document.getElementById('search-results');
    if (!items.length) { results.classList.remove('open'); return; }
    results.innerHTML = items.map(item => {
      const poster = item.poster_path ? `https://image.tmdb.org/t/p/w92${item.poster_path}` : '';
      const title = item.title || item.name || '';
      const year = (item.release_date || item.first_air_date || '').slice(0, 4);
      const type = item.media_type === 'movie' ? 'Фильм' : 'Сериал';
      return `<div class="search-item" onclick="openMedia(${item.id},'${item.media_type}');document.getElementById('search-input').value='';document.getElementById('search-results').classList.remove('open')">
        ${poster ? `<img src="${poster}" alt=""/>` : '<div style="width:32px;height:48px;background:var(--mid)"></div>'}
        <div class="search-item-info">
          <div class="search-item-title">${escHtml(title)}</div>
          <div class="search-item-meta">${type}${year ? ' · ' + year : ''}</div>
        </div>
      </div>`;
    }).join('');
    results.classList.add('open');
  } catch(e) {}
}

// ─── MEDIA DETAIL ─────────────────────────────────────────────────────────────
async function openMedia(id, type) {
  showPage('media');
  const content = document.getElementById('media-content');
  content.innerHTML = '<div class="loader" style="min-height:60vh"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  try {
    const [media, reviews, criteriaList] = await Promise.all([
      api(`/api/media/${type}/${id}`),
      api(`/api/reviews/${type}/${id}`),
      api(`/api/criteria/${type}`)
    ]);
    state.currentMedia = { id, type, media };
    state.criteria = criteriaList;
    renderMediaPage(media, type, reviews, criteriaList);
  } catch(e) {
    content.innerHTML = '<div class="empty-state"><p>Ошибка загрузки</p></div>';
  }
}

function renderMediaPage(media, type, reviews, criteriaList) {
  const content = document.getElementById('media-content');
  const title = media.title || media.name || '';
  const year = (media.release_date || media.first_air_date || '').slice(0, 4);
  const backdrop = media.backdrop_path ? `https://image.tmdb.org/t/p/w1280${media.backdrop_path}` : '';
  const poster   = media.poster_path   ? `https://image.tmdb.org/t/p/w342${media.poster_path}` : '';
  const genres   = (media.genres || []).map(g => `<span class="genre-chip">${g.name}</span>`).join('');
  const typeLabel = type === 'movie' ? 'Фильм' : type === 'tv' ? 'Сериал' : 'Игра';

  const avgScore = reviews.length
    ? (reviews.reduce((s,r) => s + r.totalScore, 0) / reviews.length).toFixed(1)
    : null;

  const myReview = state.user ? reviews.find(r => r.userId === state.user._id || r.userId === state.user.id) : null;

  content.innerHTML = `
    <div class="media-hero">
      ${backdrop ? `<div class="media-backdrop" style="background-image:url('${backdrop}')"></div>` : ''}
      <div class="media-hero-content">
        ${poster ? `<div class="media-poster"><img src="${poster}" alt="${escHtml(title)}"/></div>` : ''}
        <div class="media-info fade-in">
          <div class="media-type-badge">// ${typeLabel}</div>
          <h1 class="media-title">${escHtml(title)}</h1>
          <div class="media-meta">
            ${year ? `<span>${year}</span>` : ''}
            ${media.runtime ? `<span>${media.runtime} мин</span>` : ''}
            ${media.number_of_seasons ? `<span>${media.number_of_seasons} сезонов</span>` : ''}
            ${media.vote_average ? `<span>TMDB ${media.vote_average.toFixed(1)}</span>` : ''}
          </div>
          ${avgScore ? `
            <div class="score-display">
              <div class="score-number">${avgScore}</div>
              <div>
                <div class="score-max">/110</div>
                <div class="score-count">${reviews.length} ${plural(reviews.length, 'оценка','оценки','оценок')}</div>
              </div>
            </div>` : '<div style="color:var(--dim);font-size:13px;margin-bottom:16px">Будьте первым, кто оценит</div>'}
          ${media.overview ? `<p class="media-overview">${escHtml(media.overview)}</p>` : ''}
          <div class="genre-chips">${genres}</div>
        </div>
      </div>
    </div>

    <div class="review-section">
      <div class="reviews-list-wrap">
        <div class="reviews-title">// отзывы (${reviews.length})</div>
        <div id="reviews-list">${renderReviews(reviews, criteriaList)}</div>
      </div>
      <div class="rating-sidebar">
        ${renderRatingForm(type, criteriaList, myReview)}
      </div>
    </div>`;

  // init sliders
  if (!myReview) initSliders(criteriaList);
}

function renderReviews(reviews, criteriaList) {
  if (!reviews.length) return `<div class="empty-state"><div class="empty-state-icon">◈</div><p>Пока нет отзывов</p></div>`;
  return reviews.map(r => {
    const bars = r.criteria.map(c => {
      const pct = (c.score / 10 * 100).toFixed(0);
      return `<div class="crit-mini"><div class="crit-mini-fill" style="width:${pct}%"></div></div>`;
    }).join('');
    const date = new Date(r.createdAt).toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' });
    return `
      <div class="review-card">
        <div class="review-header">
          <span class="review-user" onclick="showPublicProfile('${escHtml(r.username)}')">@${escHtml(r.username)}</span>
          <div class="review-score-big">${r.totalScore}<span>/110</span></div>
        </div>
        <div class="review-criteria-mini">${bars}</div>
        ${r.comment ? `<p class="review-comment">${escHtml(r.comment)}</p>` : ''}
        <div class="review-date">${date}</div>
      </div>`;
  }).join('');
}

function renderRatingForm(type, criteriaList, myReview) {
  if (!state.user) {
    return `<div class="login-prompt">
      <p>Войдите, чтобы оставить оценку</p>
      <button class="btn-solid" onclick="openModal('login')">Войти</button>
    </div>`;
  }
  const vals = myReview
    ? myReview.criteria.map(c => c.score)
    : criteriaList.map(() => 5);

  const rows = criteriaList.map((c, i) => `
    <div class="criterion-row">
      <div class="criterion-name">${escHtml(c.name)}</div>
      <div class="criterion-control">
        <input type="range" class="score-slider" min="0" max="10" step="0.5" value="${vals[i]}" data-idx="${i}" oninput="onSlider(this)"/>
        <div class="score-val" id="sv-${i}">${vals[i]}</div>
        <div class="mult-badge">×${c.multiplier}</div>
      </div>
    </div>`).join('');

  const initial = calcTotal(criteriaList.map((c,i) => ({ score: vals[i], multiplier: c.multiplier })));

  return `
    <div class="rating-form-title">${myReview ? '// ваша оценка' : '// оценить'}</div>
    ${rows}
    <div class="live-score-wrap">
      <div class="live-score-label">Ваш итог</div>
      <div class="live-score-num ${scoreClass(initial)}" id="live-score">${initial}</div>
    </div>
    <textarea class="comment-input" id="review-comment" placeholder="Ваш комментарий (необязательно)…">${myReview ? escHtml(myReview.comment || '') : ''}</textarea>
    <button class="submit-btn" id="submit-review-btn" onclick="submitReview('${myReview ? myReview._id : ''}')">
      ${myReview ? 'ОБНОВИТЬ ОЦЕНКУ' : 'ОПУБЛИКОВАТЬ ОЦЕНКУ'}
    </button>
    ${myReview ? `<button class="btn-ghost" style="width:100%;margin-top:6px" onclick="deleteReview('${myReview._id}')">УДАЛИТЬ ОЦЕНКУ</button>` : ''}`;
}

function initSliders(criteriaList) {
  document.querySelectorAll('.score-slider').forEach(sl => {
    sl.addEventListener('input', () => {
      const scores = getSliderValues();
      const total = calcTotal(criteriaList.map((c,i) => ({ score: scores[i], multiplier: c.multiplier })));
      const el = document.getElementById('live-score');
      el.textContent = total;
      el.className = `live-score-num ${scoreClass(total)}`;
    });
  });
}

function onSlider(el) {
  document.getElementById('sv-' + el.dataset.idx).textContent = el.value;
}

function getSliderValues() {
  return Array.from(document.querySelectorAll('.score-slider')).map(s => parseFloat(s.value));
}

function calcTotal(criteria) {
  const raw    = criteria.reduce((s,c) => s + c.score * c.multiplier, 0);
  const maxRaw = criteria.reduce((s,c) => s + 10 * c.multiplier, 0);
  return parseFloat(((raw / maxRaw) * 110).toFixed(1));
}

function scoreClass(v) {
  if (v < 50) return 'low';
  if (v < 80) return 'mid';
  return 'high';
}

async function submitReview(existingId) {
  if (!state.user) { openModal('login'); return; }
  const btn = document.getElementById('submit-review-btn');
  btn.disabled = true; btn.textContent = '…';
  try {
    const scores   = getSliderValues();
    const comment  = document.getElementById('review-comment').value.trim();
    const criteria = state.criteria.map((c,i) => ({ name: c.name, score: scores[i], multiplier: c.multiplier }));
    const { id, type } = state.currentMedia;

    if (existingId) {
      await api(`/api/reviews/${existingId}`, 'PUT', { criteria, comment });
      showToast('Оценка обновлена');
    } else {
      await api('/api/reviews', 'POST', { tmdbId: id, mediaType: type, criteria, comment });
      showToast('Оценка опубликована');
    }
    // Reload media page
    openMedia(id, type);
  } catch(e) {
    showToast(e.message || 'Ошибка', true);
    btn.disabled = false;
    btn.textContent = existingId ? 'ОБНОВИТЬ ОЦЕНКУ' : 'ОПУБЛИКОВАТЬ ОЦЕНКУ';
  }
}

async function deleteReview(id) {
  if (!confirm('Удалить оценку?')) return;
  try {
    await api(`/api/reviews/${id}`, 'DELETE');
    showToast('Оценка удалена');
    const { id: mediaId, type } = state.currentMedia;
    openMedia(mediaId, type);
  } catch(e) {
    showToast(e.message, true);
  }
}

// ─── PROFILE ─────────────────────────────────────────────────────────────────
async function loadProfile() {
  if (!state.user) { showPage('home'); openModal('login'); return; }
  const content = document.getElementById('profile-content');
  content.innerHTML = '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  try {
    const reviews = await api('/api/profile/reviews');
    renderProfilePage(state.user, reviews);
  } catch(e) {
    content.innerHTML = '<div class="empty-state"><p>Ошибка загрузки профиля</p></div>';
  }
}

async function showPublicProfile(username) {
  showPage('profile');
  const content = document.getElementById('profile-content');
  content.innerHTML = '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  try {
    const data = await api(`/api/profile/${username}`);
    renderProfilePage(data.user, data.reviews);
  } catch(e) {
    content.innerHTML = '<div class="empty-state"><p>Пользователь не найден</p></div>';
  }
}

function renderProfilePage(user, reviews) {
  const content = document.getElementById('profile-content');
  const avgScore = reviews.length
    ? (reviews.reduce((s,r) => s + r.totalScore, 0) / reviews.length).toFixed(1)
    : '—';

  const cards = reviews.map(r => {
    const poster = r.poster ? `https://image.tmdb.org/t/p/w342${r.poster}` : '';
    const typeLabel = r.mediaType === 'movie' ? 'фильм' : r.mediaType === 'tv' ? 'сериал' : 'игра';
    return `
      <div class="profile-review-card" onclick="openMedia(${r.tmdbId},'${r.mediaType}')">
        ${poster ? `<img src="${poster}" alt="" loading="lazy"/>` : '<div style="background:var(--grey);width:100%;height:100%"></div>'}
        <div class="profile-review-info">
          <div class="profile-review-score">${r.totalScore}<span>/110</span></div>
          ${r.title ? `<div class="profile-review-title">${escHtml(r.title)}</div>` : ''}
          <div class="profile-review-type">${typeLabel}</div>
        </div>
      </div>`;
  }).join('');

  content.innerHTML = `
    <div class="profile-header fade-in">
      <div class="avatar-circle">${(user.username || 'U')[0].toUpperCase()}</div>
      <div>
        <div class="profile-name">${escHtml(user.username)}</div>
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-num">${reviews.length}</div>
            <div class="profile-stat-label">Оценок</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-num">${avgScore}</div>
            <div class="profile-stat-label">Средний балл</div>
          </div>
        </div>
      </div>
    </div>
    ${reviews.length
      ? `<div class="profile-reviews-grid fade-in">${cards}</div>`
      : '<div class="empty-state"><div class="empty-state-icon">◈</div><p>Нет оценок</p></div>'}`;
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function openModal(mode) {
  state.authMode = mode;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-error').textContent = '';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
  if (mode === 'register') {
    document.getElementById('modal-title').textContent = 'РЕГИСТРАЦИЯ';
    document.getElementById('register-fields').style.display = 'block';
    document.getElementById('modal-submit-btn').textContent = 'СОЗДАТЬ АККАУНТ';
    document.getElementById('modal-footer').innerHTML = 'Уже есть аккаунт? <a onclick="openModal(\'login\')">Войти</a>';
  } else {
    document.getElementById('modal-title').textContent = 'ВОЙТИ';
    document.getElementById('register-fields').style.display = 'none';
    document.getElementById('modal-submit-btn').textContent = 'ВОЙТИ';
    document.getElementById('modal-footer').innerHTML = 'Нет аккаунта? <a onclick="openModal(\'register\')">Зарегистрироваться</a>';
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function submitAuth() {
  const btn = document.getElementById('modal-submit-btn');
  const errEl = document.getElementById('modal-error');
  btn.disabled = true;
  errEl.textContent = '';
  try {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    let data;
    if (state.authMode === 'register') {
      const username = document.getElementById('reg-username').value.trim();
      data = await api('/api/auth/register', 'POST', { username, email, password });
    } else {
      data = await api('/api/auth/login', 'POST', { email, password });
    }
    state.token = data.token;
    state.user  = data.user;
    localStorage.setItem('rated_token', data.token);
    localStorage.setItem('rated_user', JSON.stringify(data.user));
    updateAuthUI();
    closeModal();
    showToast('Добро пожаловать, ' + data.user.username + '!');
  } catch(e) {
    errEl.textContent = e.message || 'Ошибка';
  } finally {
    btn.disabled = false;
  }
}

function logout() {
  state.token = null; state.user = null;
  localStorage.removeItem('rated_token');
  localStorage.removeItem('rated_user');
  updateAuthUI();
  showPage('home');
  showToast('Вы вышли из аккаунта');
}

function updateAuthUI() {
  const authBtns = document.getElementById('auth-btns');
  const userBtn  = document.getElementById('user-btn');
  if (state.user) {
    authBtns.style.display = 'none';
    userBtn.style.display = 'flex';
    userBtn.style.gap = '10px';
    document.getElementById('username-btn').textContent = state.user.username;
  } else {
    authBtns.style.display = 'flex';
    userBtn.style.display = 'none';
  }
}

// ─── API HELPER ───────────────────────────────────────────────────────────────
async function api(url, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' }
  };
  if (state.token) opts.headers['Authorization'] = 'Bearer ' + state.token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Ошибка сервера');
  return data;
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3000);
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return few;
  return many;
}

// Enter key in auth modal
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) submitAuth();
  if (e.key === 'Escape') closeModal();
});
</script>
